name: CI
on:
  push:
    branches: [main]
  pull_request:
jobs:
  integrate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
      - name: Sync
        run: uv sync --frozen
      - name: Pre-commit
        uses: pre-commit/action@v3.0.1
